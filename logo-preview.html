<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Still & Golden — Logo Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --off-white: #F8F5F1;
      --warm-black: #1A1714;
      --gold: #A8845A;
      --mid: #8A7E78;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #CBC6C0;
      padding: 52px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 100vh;
    }

    .page-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8A8480;
      margin-bottom: 24px;
    }

    .row {
      display: grid;
      gap: 4px;
    }
    .row-2 { grid-template-columns: 1fr 1fr; }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; }

    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 48px;
      min-height: 260px;
      position: relative;
    }

    .white  { background: #FFFFFF; }
    .cream  { background: var(--off-white); }
    .dark   { background: var(--warm-black); }

    .panel-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      position: absolute;
      top: 20px;
      left: 24px;
    }
    .dark .panel-label { color: #4A4440; }

    /* ── Wordmark ─────────────────────────── */
    .wordmark {
      font-family: 'EB Garamond', Georgia, serif;
      font-weight: 400;
      letter-spacing: 0.13em;
      color: var(--warm-black);
      white-space: nowrap;
      line-height: 1;
    }
    .wordmark .amp {
      color: var(--gold);
      font-style: italic;
    }
    .wordmark.on-dark { color: var(--off-white); }

    /* ── Horizontal lockup ────────────────── */
    .h-logo {
      display: flex;
      align-items: center;
      gap: 22px;
    }
    .v-rule {
      flex-shrink: 0;
      width: 1px;
      background: var(--gold);
      opacity: 0.45;
    }
  </style>
</head>
<body>

  <p class="page-title">Still & Golden Photography — Logo Concepts</p>

  <!-- Row 1: Primary horizontal logo, light + dark -->
  <div class="row row-2">

    <div class="panel white">
      <span class="panel-label">Primary Logo — Light</span>
      <div class="h-logo">
        <svg width="30" height="60" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <path id="la"
              d="M 0 0 C 2 -1.5 10 -4.5 18 -4.5 C 30 -4.5 46 -2 55 0
                 C 46  2  30  4.5 18  4.5 C 10 4.5 2 1.5 0 0 Z"/>
          </defs>
          <path d="M 50 195 C 49 162 45 118 48 78 C 51 42 54 20 52 5"
                stroke="#A8845A" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <use href="#la" fill="#A8845A" transform="translate(49,168) rotate(-28) scale(0.66)"/>
          <use href="#la" fill="#A8845A" transform="translate(47,145) rotate(207) scale(0.70)"/>
          <use href="#la" fill="#A8845A" transform="translate(46,122) rotate(-24) scale(0.72)"/>
          <use href="#la" fill="#A8845A" transform="translate(48,96)  rotate(204) scale(0.69)"/>
          <use href="#la" fill="#A8845A" transform="translate(50,70)  rotate(-30) scale(0.64)"/>
          <use href="#la" fill="#A8845A" transform="translate(52,47)  rotate(210) scale(0.59)"/>
          <use href="#la" fill="#A8845A" transform="translate(53,26)  rotate(-38) scale(0.48)"/>
        </svg>
        <div class="v-rule" style="height:56px"></div>
        <div class="wordmark" style="font-size:26px">Still <span class="amp">&amp;</span> Golden</div>
      </div>
    </div>

    <div class="panel dark">
      <span class="panel-label">Primary Logo — Dark</span>
      <div class="h-logo">
        <svg width="30" height="60" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <path id="lb"
              d="M 0 0 C 2 -1.5 10 -4.5 18 -4.5 C 30 -4.5 46 -2 55 0
                 C 46  2  30  4.5 18  4.5 C 10 4.5 2 1.5 0 0 Z"/>
          </defs>
          <path d="M 50 195 C 49 162 45 118 48 78 C 51 42 54 20 52 5"
                stroke="#A8845A" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <use href="#lb" fill="#A8845A" transform="translate(49,168) rotate(-28) scale(0.66)"/>
          <use href="#lb" fill="#A8845A" transform="translate(47,145) rotate(207) scale(0.70)"/>
          <use href="#lb" fill="#A8845A" transform="translate(46,122) rotate(-24) scale(0.72)"/>
          <use href="#lb" fill="#A8845A" transform="translate(48,96)  rotate(204) scale(0.69)"/>
          <use href="#lb" fill="#A8845A" transform="translate(50,70)  rotate(-30) scale(0.64)"/>
          <use href="#lb" fill="#A8845A" transform="translate(52,47)  rotate(210) scale(0.59)"/>
          <use href="#lb" fill="#A8845A" transform="translate(53,26)  rotate(-38) scale(0.48)"/>
        </svg>
        <div class="v-rule" style="height:56px"></div>
        <div class="wordmark on-dark" style="font-size:26px">Still <span class="amp">&amp;</span> Golden</div>
      </div>
    </div>

  </div>

  <!-- Row 2: Wordmark / Compact horizontal / Icon only -->
  <div class="row row-3">

    <div class="panel cream">
      <span class="panel-label">Wordmark Only</span>
      <div class="wordmark" style="font-size:24px">Still <span class="amp">&amp;</span> Golden</div>
    </div>

    <div class="panel white">
      <span class="panel-label">Compact — Small Use</span>
      <div class="h-logo">
        <svg width="18" height="36" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <path id="lc"
              d="M 0 0 C 2 -1.5 10 -4.5 18 -4.5 C 30 -4.5 46 -2 55 0
                 C 46  2  30  4.5 18  4.5 C 10 4.5 2 1.5 0 0 Z"/>
          </defs>
          <path d="M 50 195 C 49 162 45 118 48 78 C 51 42 54 20 52 5"
                stroke="#A8845A" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <use href="#lc" fill="#A8845A" transform="translate(49,168) rotate(-28) scale(0.66)"/>
          <use href="#lc" fill="#A8845A" transform="translate(47,145) rotate(207) scale(0.70)"/>
          <use href="#lc" fill="#A8845A" transform="translate(46,122) rotate(-24) scale(0.72)"/>
          <use href="#lc" fill="#A8845A" transform="translate(48,96)  rotate(204) scale(0.69)"/>
          <use href="#lc" fill="#A8845A" transform="translate(50,70)  rotate(-30) scale(0.64)"/>
          <use href="#lc" fill="#A8845A" transform="translate(52,47)  rotate(210) scale(0.59)"/>
          <use href="#lc" fill="#A8845A" transform="translate(53,26)  rotate(-38) scale(0.48)"/>
        </svg>
        <div class="v-rule" style="height:32px"></div>
        <div class="wordmark" style="font-size:16px">Still <span class="amp">&amp;</span> Golden</div>
      </div>
    </div>

    <div class="panel dark">
      <span class="panel-label">Icon Only</span>
      <svg width="38" height="76" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <path id="ld"
            d="M 0 0 C 2 -1.5 10 -4.5 18 -4.5 C 30 -4.5 46 -2 55 0
               C 46  2  30  4.5 18  4.5 C 10 4.5 2 1.5 0 0 Z"/>
        </defs>
        <path d="M 50 195 C 49 162 45 118 48 78 C 51 42 54 20 52 5"
              stroke="#A8845A" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <use href="#ld" fill="#A8845A" transform="translate(49,168) rotate(-28) scale(0.66)"/>
        <use href="#ld" fill="#A8845A" transform="translate(47,145) rotate(207) scale(0.70)"/>
        <use href="#ld" fill="#A8845A" transform="translate(46,122) rotate(-24) scale(0.72)"/>
        <use href="#ld" fill="#A8845A" transform="translate(48,96)  rotate(204) scale(0.69)"/>
        <use href="#ld" fill="#A8845A" transform="translate(50,70)  rotate(-30) scale(0.64)"/>
        <use href="#ld" fill="#A8845A" transform="translate(52,47)  rotate(210) scale(0.59)"/>
        <use href="#ld" fill="#A8845A" transform="translate(53,26)  rotate(-38) scale(0.48)"/>
      </svg>
    </div>

  </div>

</body>
</html>
